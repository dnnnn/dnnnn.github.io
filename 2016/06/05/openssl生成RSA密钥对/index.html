    </header>
    <div class="entry">
      
        <h2 id="生成RSA密钥对"><a href="#生成RSA密钥对" class="headerlink" title="生成RSA密钥对"></a>生成RSA密钥对</h2><h3 id="生成RSA私钥文件"><a href="#生成RSA私钥文件" class="headerlink" title="生成RSA私钥文件"></a>生成RSA私钥文件</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">$ openssl genrsa -out private_rsa.pem  1024</span><br></pre></td></tr></table></figure>
<h3 id="生成RSA公钥文件"><a href="#生成RSA公钥文件" class="headerlink" title="生成RSA公钥文件"></a>生成RSA公钥文件</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">$ openssl rsa -in private_rsa.pem -pubout -out public_rsa.pem</span><br></pre></td></tr></table></figure>
<p>此时文件为BASE64编码，执行以下命令，以明文形式输出密钥的各个参数值</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">$ openssl rsa -in private_rsa.pem -text -out private.txt</span><br></pre></td></tr></table></figure>
<p>然后就可以在private.txt文件中查看RSA密钥中各个参数的值。</p>
